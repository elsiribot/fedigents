name: Deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v16

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Checkout Fedimint dependency
        uses: actions/checkout@v4
        with:
          repository: elsiribot/fedimint
          path: deps/fedimint

      - name: Link Fedimint dependency
        run: ln -s "$GITHUB_WORKSPACE/deps/fedimint" "$GITHUB_WORKSPACE/../fedimint"

      - name: Build site
        run: nix develop -c trunk build --release --public-url "/${{ github.event.repository.name }}/"

      - name: Add SPA fallback
        run: cp dist/index.html dist/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
